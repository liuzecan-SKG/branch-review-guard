# 规则包开关。安装器按 --rules 参数写入；也可手动改。
# 评审核心只加载 enabled: true 的包；enabled: false 但配置了 auto_enable 的包，
# 会在评审运行时按标记探测目标项目，命中则本次运行自动启用（不修改本文件），
# 报告"已启用规则包"处注明"（自动识别启用）"。显式 enabled: true 优先，无需探测。
#
# 项目本地规则叠加（v0.5.0+）：本文件只管插件自带 rules/ 的 pack 开关；
# 评审还会 best-effort 叠加读取"被评审项目根 branch-review-rules/"下的规则——
# 那里的规则独立于此处开关，全量按 applies_to 加载（详见 SKILL.md `## 规则机制`）。
# 开发侧 skill 也读 branch-review-rules/，故开发与评审共享同一份、标准一致。
packs:
  baseline:
    enabled: true        # 栈无关通用规则，默认开
  skg-spring:
    enabled: false       # SKG Health Global 技术栈包，默认关；同栈团队可改 true 或靠下方自动识别
    auto_enable:
      # 命中任一标记即视为同栈项目：匹配仓库根目录名 / 模块目录名 / pom.xml 的 groupId/artifactId
      project_markers:
        - skg-health-global
        - skg_health_global
  discover-new:
    enabled: false       # 默认关；靠下方 auto_enable 命中 skg 项目才自动启用——首批 19 条是 skg 栈沉淀（见 discover-new/README.md），不该默认加给非 skg 的 java 项目
    auto_enable:
      # 与 skg-spring 同模式：命中 skg 项目自动启用本次运行，非 skg 项目不受影响
      project_markers:
        - skg-health-global
        - skg_health_global

# 可选：按规则 id 覆盖默认严重度（不改规则文件本身）
severity_overrides: {}
  # 例：
  # skg-spring/txn-multitransactional-escape: P1

# 可选：全局禁用某些规则 id（即使所在包启用）
disabled_rules: []
  # 例：
  # - baseline/generated-code-low-priority
